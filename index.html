<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --accent: #00e5bc;
        --accent-hover: #00c49f;
        --panel: rgba(12, 17, 32, 0.75);
        --panel-solid: #0c1020;
        --panel-border: rgba(120, 150, 220, 0.28);
        --text-main: #eef1fb;
        --text-dim: #90a0c8;
        --btn-disabled-bg: #454e63;
        --btn-disabled-text: #cfd4e2;
    }

    html, body { height: 100%; }

    body {
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        background: #050814;
    }

    /* ================= HÁTTÉR ================= */
    .bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        overflow: hidden;
        background: #050814 url('bg.jpg') no-repeat center center;
        background-size: cover;
    }

    .bg-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    .bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(4, 6, 14, 0.45);
        z-index: 2;
    }

    @media (max-width: 768px), (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition: none !important; animation: none !important; }
        .bg-video { display: none; }
    }

    /* ================= FŐ TARTALOM ================= */
    main {
        position: relative;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8vh 20px 8vh;
        gap: 40px;
    }

    /* ================= KÁRTYA (PROFIL) ================= */
    .browser-window {
        width: 100%;
        max-width: 420px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
        overflow: hidden;
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .no-js .browser-window { opacity: 1; transform: none; }
    .browser-window.reveal { opacity: 1; transform: translateY(0); }

    .browser-header {
        background: rgba(255, 255, 255, 0.04);
        padding: 10px 15px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-red { background-color: #ff5f56; }
    .dot-yellow { background-color: #ffbd2e; }
    .dot-green { background-color: #27c93f; }

    .content { padding: 34px 30px 28px; text-align: center; }

    .profile-container {
        position: relative;
        width: 108px;
        height: 108px;
        margin: 0 auto 16px;
    }

    .profile-img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        display: block;
        border: 3px solid rgba(140, 170, 255, 0.55);
        box-shadow: 0 0 0 6px rgba(76, 141, 255, 0.12), 0 8px 20px rgba(0,0,0,0.35);
    }

    .wordmark {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.6rem;
        letter-spacing: 0.06em;
        color: var(--text-main);
        margin-bottom: 26px;
    }

    .links-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        list-style: none;
    }

    .link-btn {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        position: relative;
        text-decoration: none;
        padding: 16px 20px 16px 72px;
        border-radius: 10px;
        font-size: 0.95rem;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        color: #ffffff;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .link-btn:hover { transform: translateY(-3px); }

    .link-btn:focus-visible,
    .casino-btn:focus-visible,
    .gate-btn:focus-visible,
    .gate-check input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
    }

    .link-icon {
        position: absolute;
        left: 16px;
        width: 40px;
        height: 40px;
        object-fit: contain;
    }

    .btn-discord:hover  { background: #5865F2; box-shadow: 0 8px 22px rgba(88, 101, 242, 0.45); }
    .btn-twitch:hover   { background: #9146FF; box-shadow: 0 8px 22px rgba(145, 70, 255, 0.45); }
    .btn-telegram:hover { background: #26A5E4; box-shadow: 0 8px 22px rgba(38, 165, 228, 0.45); }
    .btn-email:hover    { background: #EA4335; box-shadow: 0 8px 22px rgba(234, 67, 53, 0.45); }

    /* ================= KASZINO SZEKCIÓ ================= */
    .casino-section {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .no-js .casino-section { opacity: 1; transform: none; }
    .casino-section.reveal { opacity: 1; transform: translateY(0); }

    .section-header-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.4rem;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
        padding-left: 5px;
    }

    .ad-tag {
        font-family: 'Inter', sans-serif;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        border: 1px solid var(--panel-border);
        border-radius: 5px;
        padding: 2px 7px;
        margin-left: auto;
    }

    .casino-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        width: 100%;
    }

    .casino-card {
        background: var(--panel);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .casino-card:hover {
        transform: translateY(-5px);
        border-color: rgba(0, 229, 188, 0.5);
        box-shadow: 0 20px 45px rgba(0, 229, 188, 0.15);
    }

    .casino-logo {
        width: 100%;
        height: 160px;
        object-fit: contain;
        display: block;
        margin: 0 auto;
    }

    .casino-perks {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.82rem;
        color: var(--text-dim);
        list-style: none;
    }

    .casino-perk-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .casino-perk-item::before {
        content: "✓";
        color: var(--accent);
        font-weight: bold;
    }

    .casino-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        padding: 12px;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        color: #050814;
        background: var(--accent);
        transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .casino-btn:hover {
        background: var(--accent-hover);
        box-shadow: 0 6px 20px rgba(0, 229, 188, 0.4);
    }

    @media (min-width: 700px) {
        .casino-section { max-width: 900px; }
        .casino-grid { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    }

    /* ================= KAPU ================= */
    .gate-overlay {
        position: fixed;
        inset: 0;
        background: rgba(3, 5, 12, 0.88);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        padding: 20px;
        opacity: 1;
        transition: opacity 0.35s ease;
    }

    .gate-overlay.hidden { opacity: 0; pointer-events: none; }
    .no-js .gate-overlay { display: none; }

    .gate-card {
        width: 100%;
        max-width: 360px;
        background: var(--panel-solid);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 32px 28px 26px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .gate-badge {
        width: 56px;
        height: 56px;
        margin: 0 auto 18px;
        border-radius: 50%;
        border: 2px solid var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.1rem;
    }

    .gate-card h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; margin-bottom: 20px; }

    .gate-check {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        text-align: left;
        font-size: 0.88rem;
        color: var(--text-dim);
        margin-bottom: 12px;
        cursor: pointer;
    }

    .gate-check input {
        margin-top: 2px;
        accent-color: var(--accent);
        width: 15px;
        height: 15px;
        flex-shrink: 0;
    }

    .gate-btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 0.92rem;
        font-weight: 600;
        border: 1px solid var(--panel-border);
        cursor: pointer;
        margin-top: 8px;
        transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .gate-btn-confirm { background: var(--btn-disabled-bg); color: var(--btn-disabled-text); }
    .gate-btn-confirm:not(:disabled) { background: var(--accent); color: #050814; }
    .gate-btn-confirm:not(:disabled):hover { background: var(--accent-hover); box-shadow: 0 6px 18px rgba(0, 229, 188, 0.4); }
    .gate-btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }

    .gate-btn-leave { background: transparent; color: var(--text-dim); }
    .gate-btn-leave:hover { border-color: rgba(255,255,255,0.4); color: var(--text-main); }

    footer {
        position: relative;
        z-index: 5;
        text-align: center;
        padding: 0 20px 30px;
        font-size: 0.72rem;
        color: rgba(144, 160, 200, 0.5);
    }
</style>

<body class="no-js">

<main id="top">

</main>

<footer>
    &copy; <span id="year"></span> casi
</footer>

<script>
    document.body.classList.remove('no-js');
    document.getElementById('year').textContent = new Date().getFullYear();

    document.addEventListener('DOMContentLoaded', function () {
        var bgVideo = document.querySelector('.bg-video');
        if (bgVideo) {
            var startVideo = function () {
                var playPromise = bgVideo.play();
                if (playPromise !== undefined) {
                    playPromise.catch(function () {
                        var resume = function () { bgVideo.play(); };
                        document.addEventListener('click', resume, { once: true });
                        document.addEventListener('touchstart', resume, { once: true });
                        document.addEventListener('keydown', resume, { once: true });
                    });
                }
            };
            startVideo();
        }

        var chkAge = document.getElementById('chkAge');
        var btnConfirm = document.getElementById('btnConfirm');
        var btnLeave = document.getElementById('btnLeave');
        var gateOverlay = document.getElementById('gateOverlay');
        var mainCard = document.getElementById('mainCard');
        var casinoSection = document.getElementById('casinoSection');

        function updateConfirmState() {
            btnConfirm.disabled = !chkAge.checked;
        }

        chkAge.addEventListener('change', updateConfirmState);

        function enterSite() {
            gateOverlay.classList.add('hidden');
            mainCard.classList.add('reveal');
            casinoSection.classList.add('reveal');
            if (bgVideo) { bgVideo.play(); }
            setTimeout(function () { gateOverlay.style.display = 'none'; }, 400);
        }

        btnConfirm.addEventListener('click', function () {
            if (!btnConfirm.disabled) enterSite();
        });

        btnLeave.addEventListener('click', function () {
            window.location.href = 'https://www.google.com';
        });

        var focusableElements = gateOverlay.querySelectorAll('input, button');
        var firstElement = focusableElements[0];
        var lastElement = focusableElements[focusableElements.length - 1];

        gateOverlay.addEventListener('keydown', function (e) {
            if (e.key === 'Tab') {
                if (e.shiftKey) {
                    if (document.activeElement === firstElement) {
                        lastElement.focus();
                        e.preventDefault();
                    }
                } else {
                    if (document.activeElement === lastElement) {
                        firstElement.focus();
                        e.preventDefault();
                    }
                }
            }
        });
        
        if(firstElement) firstElement.focus();
    });
</script>
