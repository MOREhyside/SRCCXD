    <style>

        /* ================= VERIFIKÁCIÓS KAPU ================= */
        .gate-overlay {

            opacity: 1;
            transition: opacity 0.35s ease;
        }

        .gate-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .gate-card {
            width: 100%;

        }

        .gate-badge {
            width: 56px;
            height: 56px;
            margin: 0 auto 18px;
            border-radius: 50%;

            font-family: 'Space Grotesk', sans-serif;

        .gate-check {
            display: flex;

            margin-bottom: 12px;

            margin-top: 2px;
            accent-color: var(--bg-glow);

        }

        .gate-btn {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.92rem;
            font-weight: 600;
            border: 1px solid rgba(120, 150, 220, 0.25);
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
        }

        .gate-btn-confirm {
            background: #454e63;
            color: #cfd4e2;
        }

        .gate-btn-confirm:not(:disabled):hover {
            background: var(--bg-glow);
            color: #fff;
            box-shadow: 0 6px 18px rgba(76, 141, 255, 0.4);
        }

        .gate-btn-confirm:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .gate-btn-leave {
            background: transparent;
            color: var(--text-dim);
        }

        .gate-btn-leave:hover {
            border-color: rgba(255,255,255,0.4);

        /* ================= FŐ TARTALOM ================= */

            background: var(--panel);
            backdrop-filter: blur(18px);

            border: 1px solid var(--panel-border);
            border-radius: 16px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
            overflow: hidden;
            opacity: 0;
            transform: translateY(18px);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* Ha a JS nem futna le valamiért, sose maradjon örökre láthatatlan az oldal */
        .no-js .browser-window {
            opacity: 1;
            transform: none;
        }

        .browser-window.reveal {

        }

        .link-btn {

            justify-content: center;

            font-size: 0.92rem;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: #ffffff;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.25s ease;
        }

        .link-btn:hover {
            transform: translateY(-3px);
        }

        .btn-discord:hover { background: #5865F2; box-shadow: 0 8px 22px rgba(88, 101, 242, 0.45); }

        .link-icon {
            width: 20px;
            height: 20px;
            object-fit: contain;
        }
    </style>
</head>
<body class="no-js">

    <!-- ================= VERIFIKÁCIÓS KAPU ================= -->
    <div class="gate-overlay" id="gateOverlay">
        <div class="gate-card">
            <div class="gate-badge">18+</div>
            <h2>Access Verification</h2>

            <label class="gate-check">
                <input type="checkbox" id="chkAge">
                I confirm I am 18 or older.
            </label>
            <label class="gate-check">
                <input type="checkbox" id="chkRegion">
                I am outside Hungary.
            </label>

            <button class="gate-btn gate-btn-confirm" id="btnConfirm" disabled>Confirm, Enter</button>
            <button class="gate-btn gate-btn-leave" id="btnLeave">No, take me away!</button>
        </div>
    </div>

    <!-- ================= FŐ TARTALOM ================= -->
    <div class="browser-window" id="mainCard">
        <div class="browser-header">
            <div class="dots">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
        </div>

        <div class="content">
            <div class="profile-container">
                <img src="pfp.png" alt="Profilkép" class="profile-img">
            </div>

            <div class="wordmark">CASI</div>
            <div class="subtitle">srccxd</div>

            <div class="links-list">
                <a href="https://discord.gg/kNU6CpUC5Q" target="_blank" class="link-btn btn-discord">
                    <img src="discord-logo.png" alt="Discord" class="link-icon"> Discord (casi)
                </a>
                <a href="https://www.twitch.tv/srccxd" target="_blank" class="link-btn btn-twitch">
                    <img src="twitch-logo.png" alt="Twitch" class="link-icon"> Twitch (srccxd)
                </a>
                <a href="https://t.me/srccxd" target="_blank" class="link-btn btn-telegram">
                    <img src="telegram-logo.png" alt="Telegram" class="link-icon"> Telegram (srccxd)
                </a>
                <a href="mailto:sourceid18@gmail.com" class="link-btn btn-email">
                    <img src="gmail-logo.png" alt="Email" class="link-icon"> Business email
                </a>
            </div>
        </div>
    </div>

    <script>
        document.body.classList.remove('no-js');

        document.addEventListener('DOMContentLoaded', function () {
            var chkAge = document.getElementById('chkAge');
            var chkRegion = document.getElementById('chkRegion');
            var btnConfirm = document.getElementById('btnConfirm');
            var btnLeave = document.getElementById('btnLeave');
            var gateOverlay = document.getElementById('gateOverlay');
            var mainCard = document.getElementById('mainCard');

            function updateConfirmState() {
                btnConfirm.disabled = !(chkAge.checked && chkRegion.checked);
            }
            chkAge.addEventListener('change', updateConfirmState);
            chkRegion.addEventListener('change', updateConfirmState);

            function enterSite() {
                gateOverlay.classList.add('hidden');
                mainCard.classList.add('reveal');
                try { localStorage.setItem('casi_verified', '1'); } catch (e) {}
                setTimeout(function () { gateOverlay.style.display = 'none'; }, 400);
            }

            btnConfirm.addEventListener('click', function () {
                if (!btnConfirm.disabled) enterSite();
            });

            btnLeave.addEventListener('click', function () {
                window.location.href = 'https://www.google.com';
            });

            // Ha korábban már megerősítette, ne kérdezze újra ugyanabban a böngészőben
            var alreadyVerified = false;
            try { alreadyVerified = localStorage.getItem('casi_verified') === '1'; } catch (e) {}
            if (alreadyVerified) {
                gateOverlay.style.display = 'none';
                mainCard.classList.add('reveal');
            }
        });
    </script>

</body>
</html>
