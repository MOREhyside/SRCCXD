<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Giveaway</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0e0e10;
            color: #efeff1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
            background-image: radial-gradient(circle at 50% 20%, #1f1f23 0%, #0e0e10 100%);
        }

        .top-right-profile {
            position: absolute;
            top: 24px;
            right: 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(24, 24, 27, 0.85);
            backdrop-filter: blur(10px);
            padding: 8px 16px 8px 10px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }
        .top-right-profile img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #5865F2;
        }
        .top-right-profile span {
            font-weight: 600;
            font-size: 14px;
            color: #ffffff;
            letter-spacing: 0.3px;
        }
        .logout-btn {
            background: transparent;
            border: none;
            color: #adadb8;
            font-size: 12px;
            cursor: pointer;
            margin-left: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #ff5555;
        }

        .container {
            background: rgba(24, 24, 27, 0.75);
            backdrop-filter: blur(16px);
            padding: 45px 35px;
            border-radius: 16px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.6);
            text-align: center;
            width: 100%;
            max-width: 420px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: #5865F2;
            border-radius: 0 0 4px 4px;
            box-shadow: 0 0 12px #5865F2;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 12px;
            color: #ffffff;
            font-weight: 700;
            letter-spacing: -0.5px;
        }
        p {
            color: #adadb8;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            background-color: #5865F2;
            color: white;
            border: none;
            padding: 14px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.25s ease;
            width: 100%;
            text-decoration: none;
            box-shadow: 0 4px 15px rgba(88, 101, 242, 0.4);
        }
        .btn:hover {
            background-color: #4752C4;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(88, 101, 242, 0.6);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .hidden {
            display: none !important;
        }

        .success-msg {
            color: #00f593;
            margin-top: 15px;
            font-weight: 600;
            font-size: 15px;
            background: rgba(0, 245, 147, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 245, 147, 0.2);
        }

        .error-box {
            background: rgba(255, 85, 85, 0.15);
            border: 1px solid #ff5555;
            color: #ff8888;
            padding: 12px;
            border-radius: 8px;
            margin-top: 20px;
            font-size: 13px;
            word-break: break-all;
            text-align: left;
        }
    </style>
</head>
<body>

    <div id="top-profile" class="top-right-profile hidden">
        <img id="top-user-avatar" src="" alt="Avatar">
        <span id="top-username-display"></span>
        <button class="logout-btn" onclick="logout()">Kilépés</button>
    </div>

    <div class="container">
        <h1>Discord Giveaway</h1>
        <p id="info-text">Jelentkezz be a Discord fiókoddal, hogy eséllyel indulj a sorsoláson!</p>

        <div id="login-section">
            <button id="login-btn" class="btn" onclick="loginWithDiscord()">
                Bejelentkezés Discord-ral
            </button>
        </div>

        <div id="giveaway-section" class="hidden">
            <button id="enter-btn" class="btn" onclick="enterGiveaway()">
                Jelentkezés a Sorsolásra
            </button>
            <p id="status-msg" class="success-msg hidden">Sikeresen jelentkeztél a sorsolásra!</p>
        </div>

        <div id="error-display" class="error-box hidden"></div>
    </div>

    <script>
        const DISCORD_CLIENT_ID = 'IDE_ÍRD_BE_A_DISCORD_CLIENT_ID_D ET';
        const REDIRECT_URI = 'https://morehyside.github.io/SRCCXD/';
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9n9FPUMlFtLOeDNyYqB8dSu6rr2HNcqGm_SeojIV_6t6GOkdYn9cVPeVDLQoWuc1Q/exec';

        function showUIError(message) {
            const errBox = document.getElementById('error-display');
            errBox.innerText = 'HIBA: ' + message;
            errBox.classList.remove('hidden');
        }

        function clearAuthStorage() {
            localStorage.removeItem('discord_token');
            localStorage.removeItem('discord_username');
            localStorage.removeItem('discord_avatar');
        }

        function loginWithDiscord() {
            try {
                clearAuthStorage();
                const authUrl = `https://discord.com/api/oauth2/authorize?client_id=${DISCORD_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify`;
                window.location.href = authUrl;
            } catch (err) {
                showUIError('Bejelentkezési hiba: ' + err.message);
            }
        }

        window.onload = function() {
            try {
                const hash = window.location.hash.substring(1);
                const params = new URLSearchParams(hash);
                const accessToken = params.get('access_token');
                const errorParam = params.get('error');
                const errorDescription = params.get('error_description');

                if (errorParam) {
                    showUIError('Discord elutasította: ' + errorParam + (errorDescription ? ' (' + decodeURIComponent(errorDescription) + ')' : ''));
                    window.history.replaceState({}, document.title, window.location.pathname);
                    return;
                }

                if (accessToken) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                    localStorage.setItem('discord_token', accessToken);
                    fetchUserData(accessToken);
                    return;
                }

                const token = localStorage.getItem('discord_token');
                if (token) {
                    fetchUserData(token);
                }
            } catch (err) {
                showUIError('Indítási hiba: ' + err.message);
            }
        };

        function fetchUserData(token) {
            fetch('https://discord.com/api/users/@me', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(res => {
                if (!res.ok) throw new Error('Discord API hiba, státusz: ' + res.status);
                return res.json();
            })
            .then(user => {
                const username = user.global_name || user.username;
                let avatarUrl = user.avatar 
                    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                    : `https://cdn.discordapp.com/embed/avatars/${Number(user.id >> 22n) % 6}.png`;

                localStorage.setItem('discord_username', username);
                localStorage.setItem('discord_avatar', avatarUrl);
                showGiveawayUI(username, avatarUrl);
            })
            .catch(err => {
                showUIError('Adatlekérési hiba: ' + err.message);
                clearAuthStorage();
                document.getElementById('login-section').classList.remove('hidden');
                document.getElementById('giveaway-section').classList.add('hidden');
                document.getElementById('top-profile').classList.add('hidden');
            });
        }

        function showGiveawayUI(username, avatarUrl) {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('giveaway-section').classList.remove('hidden');
            document.getElementById('info-text').innerText = `Üdv, ${username}! Már csak egy kattintás a sorsolásig.`;

            const topProfile = document.getElementById('top-profile');
            document.getElementById('top-username-display').innerText = username;
            if (avatarUrl) {
                document.getElementById('top-user-avatar').src = avatarUrl;
            }
            topProfile.classList.remove('hidden');
        }

        function logout() {
            clearAuthStorage();
            window.location.href = REDIRECT_URI;
        }

        function enterGiveaway() {
            const username = localStorage.getItem('discord_username');
            if (!username) {
                showUIError('Nincs bejelentkezett felhasználó!');
                return;
            }

            const enterBtn = document.getElementById('enter-btn');
            enterBtn.disabled = true;
            enterBtn.innerText = 'Küldés folyamatban...';

            fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username })
            })
            .then(() => {
                enterBtn.classList.add('hidden');
                document.getElementById('status-msg').classList.remove('hidden');
            })
            .catch(err => {
                showUIError('Google Script hiba: ' + err.message);
                enterBtn.disabled = false;
                enterBtn.innerText = 'Jelentkezés a Sorsolásra';
            });
        }
    </script>
</body>
</html>
