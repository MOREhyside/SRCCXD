<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>casi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --accent: #00e5bc;
        --accent-hover: #00c49f;
        --panel: rgba(12, 17, 32, 0.75);
        --panel-border: rgba(120, 150, 220, 0.28);
        --text-main: #eef1fb;
        --text-dim: #90a0c8;
    }

    html, body { height: 100%; }

    body {
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        background: #050814;
    }

    /* ================= HÁTTÉR ================= */
    .bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        background: linear-gradient(rgba(4, 6, 14, 0.45), rgba(4, 6, 14, 0.45)),
                    url('bg.jpg') no-repeat center center fixed;
        background-size: cover;
    }

    @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition: none !important; animation: none !important; }
    }

    /* ================= FŐ TARTALOM ================= */
    main {
        position: relative;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 4vh 20px 8vh;
        gap: 40px;
    }

    .hero-title {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: clamp(2.8rem, 9vw, 5rem);
        letter-spacing: 0.05em;
        color: #fff;
        text-shadow: 0 0 40px rgba(76,141,255,0.65), 0 0 90px rgba(145,70,255,0.35);
        text-align: center;
        opacity: 0;
        transform: translateY(-10px);
        animation: dropIn 0.7s ease forwards 0.1s;
    }

    @keyframes dropIn {
        to { opacity: 1; transform: translateY(0); }
    }

    /* ================= KÁRTYA (PROFIL) ================= */
    .browser-window {
        width: 100%;
        max-width: 420px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
        overflow: hidden;
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .no-js .browser-window { opacity: 1; transform: none; }
    .browser-window.reveal { opacity: 1; transform: translateY(0); }

    .browser-header {
        background: rgba(255, 255, 255, 0.04);
        padding: 10px 15px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-red { background-color: #ff5f56; }
    .dot-yellow { background-color: #ffbd2e; }
    .dot-green { background-color: #27c93f; }

    .content { padding: 34px 30px 28px; text-align: center; }

    .profile-container {
        position: relative;
        width: 108px;
        height: 108px;
        margin: 0 auto 16px;
    }

    .profile-img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        display: block;
        border: 3px solid rgba(140, 170, 255, 0.55);
        box-shadow: 0 0 0 6px rgba(76, 141, 255, 0.12), 0 8px 20px rgba(0,0,0,0.35);
    }

    .wordmark {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.6rem;
        letter-spacing: 0.06em;
        color: var(--text-main);
        margin-bottom: 4px;
    }

    .subtitle {
        font-size: 0.8rem;
        color: var(--text-dim);
        letter-spacing: 0.04em;
        margin-bottom: 26px;
    }

    .links-list { display: flex; flex-direction: column; gap: 12px; }

    .link-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        text-decoration: none;
        padding: 13px 20px;
        border-radius: 10px;
        font-size: 0.92rem;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        color: #ffffff;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.25s ease;
    }

    .link-btn:hover { transform: translateY(-3px); }
    .link-icon { width: 20px; height: 20px; object-fit: contain; flex-shrink: 0; }

    .btn-discord:hover  { background: #5865F2; box-shadow: 0 8px 22px rgba(88, 101, 242, 0.45); }
    .btn-twitch:hover   { background: #9146FF; box-shadow: 0 8px 22px rgba(145, 70, 255, 0.45); }
    .btn-telegram:hover { background: #26A5E4; box-shadow: 0 8px 22px rgba(38, 165, 228, 0.45); }
    .btn-email:hover    { background: #EA4335; box-shadow: 0 8px 22px rgba(234, 67, 53, 0.45); }

    /* ================= KASZINO SZEKCIÓ ================= */
    .casino-section {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 20px;
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.5s ease, transform 0.5s ease;
    }
    .no-js .casino-section { opacity: 1; transform: none; }
    .casino-section.reveal { opacity: 1; transform: translateY(0); }

    .section-header-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.4rem;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
        padding-left: 5px;
    }

    .casino-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        width: 100%;
    }

    .casino-card {
        background: var(--panel);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .casino-card:hover {
        transform: translateY(-5px);
        border-color: rgba(0, 229, 188, 0.5);
        box-shadow: 0 20px 45px rgba(0, 229, 188, 0.15);
    }

    .casino-logo-box {
        width: 185px;
        height: 52px;
        margin: 0 auto;
        background: rgba(0, 0, 0, 0.4);
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        border: 1px solid rgba(255, 255, 255, 0.05);
        overflow: hidden;
    }

    .casino-logo {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }

    .casino-perks {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.82rem;
        color: var(--text-dim);
    }

    .casino-perk-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .casino-perk-item::before {
        content: "✓";
        color: var(--accent);
        font-weight: bold;
    }

    .casino-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        padding: 12px;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        color: #050814;
        background: var(--accent);
        transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .casino-btn:hover {
        background: var(--accent-hover);
        box-shadow: 0 6px 20px rgba(0, 229, 188, 0.4);
    }

    /* ================= KAPU ================= */
    .gate-overlay {
        position: fixed;
        inset: 0;
        background: rgba(3, 5, 12, 0.88);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 100;
        padding: 20px;
        opacity: 1;
        transition: opacity 0.35s ease;
    }

    .gate-overlay.hidden { opacity: 0; pointer-events: none; }

    .gate-card {
        width: 100%;
        max-width: 360px;
        background: #0c1020;
        border: 1px solid rgba(120, 150, 220, 0.25);
        border-radius: 16px;
        padding: 32px 28px 26px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .gate-badge {
        width: 56px;
        height: 56px;
        margin: 0 auto 18px;
        border-radius: 50%;
        border: 2px solid var(--text-main);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.1rem;
    }

    .gate-card h2 { font-family: 'Space Grotesk', sans-serif; font-size: 1.3rem; margin-bottom: 20px; }

    .gate-check {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        text-align: left;
        font-size: 0.88rem;
        color: var(--text-dim);
        margin-bottom: 12px;
        cursor: pointer;
    }

    .gate-check input {
        margin-top: 2px;
        accent-color: var(--accent);
        width: 15px;
        height: 15px;
        flex-shrink: 0;
    }

    .gate-btn {
        width: 100%;
        padding: 12px;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-size: 0.92rem;
        font-weight: 600;
        border: 1px solid rgba(120, 150, 220, 0.25);
        cursor: pointer;
        margin-top: 8px;
        transition: transform 0.15s ease, box-shadow 0.2s ease, opacity 0.2s ease;
    }

    .gate-btn-confirm { background: #454e63; color: #cfd4e2; }
    .gate-btn-confirm:not(:disabled):hover { background: var(--accent); color: #050814; box-shadow: 0 6px 18px rgba(0, 229, 188, 0.4); }
    .gate-btn-confirm:disabled { opacity: 0.5; cursor: not-allowed; }
    .gate-btn-leave { background: transparent; color: var(--text-dim); }
    .gate-btn-leave:hover { border-color: rgba(255,255,255,0.4); color: var(--text-main); }

    footer {
        position: relative;
        z-index: 5;
        text-align: center;
        padding: 0 20px 30px;
        font-size: 0.72rem;
        color: rgba(144, 160, 200, 0.5);
    }
</style>
</head>
<body class="no-js">

<div class="bg"></div>

<!-- ================= VERIFIKÁCIÓS KAPU ================= -->
<div class="gate-overlay" id="gateOverlay">
    <div class="gate-card">
        <div class="gate-badge">18+</div>
        <h2>Access Verification</h2>
        <label class="gate-check">
            <input type="checkbox" id="chkAge">
            I confirm I am 18 or older.
        </label>
        <label class="gate-check">
            <input type="checkbox" id="chkRegion">
            I am outside Hungary.
        </label>
        <button class="gate-btn gate-btn-confirm" id="btnConfirm" disabled>Confirm, Enter</button>
        <button class="gate-btn gate-btn-leave" id="btnLeave">No, take me away!</button>
    </div>
</div>

<main id="top">
    <div class="hero-title">CASI</div>

    <!-- ================= PROFIL KÁRTYA ================= -->
    <div class="browser-window" id="mainCard">
        <div class="browser-header">
            <div class="dots">
                <div class="dot dot-red"></div>
                <div class="dot dot-yellow"></div>
                <div class="dot dot-green"></div>
            </div>
        </div>

        <div class="content">
            <div class="profile-container">
                <img src="pfp.png" alt="Profilkép" class="profile-img">
            </div>

            <div class="wordmark">CASI</div>
            <div class="subtitle">srccxd</div>

            <div class="links-list">
                <a href="https://discord.gg/kNU6CpUC5Q" target="_blank" class="link-btn btn-discord">
                    <img src="discord-logo.png" alt="Discord" class="link-icon"> Discord (casi)
                </a>
                <a href="https://www.twitch.tv/srccxd" target="_blank" class="link-btn btn-twitch">
                    <img src="twitch-logo.png" alt="Twitch" class="link-icon"> Twitch (srccxd)
                </a>
                <a href="https://t.me/srccxd" target="_blank" class="link-btn btn-telegram">
                    <img src="telegram-logo.png" alt="Telegram" class="link-icon"> Telegram (srccxd)
                </a>
                <a href="mailto:sourceid18@gmail.com" class="link-btn btn-email">
                    <img src="gmail-logo.png" alt="Email" class="link-icon"> Business email
                </a>
            </div>
        </div>
    </div>

    <!-- ================= KASZINO SZEKCIÓ ================= -->
    <div class="casino-section" id="casinoSection">
        <div class="section-header-title">🎰 Featured Casino</div>
        
        <div class="casino-grid">
            <div class="casino-card">
                <div class="casino-logo-box">
                    <img src="spinline-logo.png" alt="SpinLine" class="casino-logo">
                </div>
                <div class="casino-perks">
                    <div class="casino-perk-item">Üdvözlő csomag</div>
                    <div class="casino-perk-item">Akár 720 000 Ft</div>
                    <div class="casino-perk-item">+ 800 Ingyenes Pörgetés</div>
                </div>
                <a href="https://spln.pleotra.com/?mid=382466_2215736" target="_blank" class="casino-btn">Játék most</a>
            </div>
        </div>
    </div>
</main>

<footer>&copy; <span id="year"></span> casi</footer>

<script>
    document.body.classList.remove('no-js');
    document.getElementById('year').textContent = new Date().getFullYear();

    document.addEventListener('DOMContentLoaded', function () {
        var chkAge = document.getElementById('chkAge');
        var chkRegion = document.getElementById('chkRegion');
        var btnConfirm = document.getElementById('btnConfirm');
        var btnLeave = document.getElementById('btnLeave');
        var gateOverlay = document.getElementById('gateOverlay');
        var mainCard = document.getElementById('mainCard');
        var casinoSection = document.getElementById('casinoSection');

        function updateConfirmState() {
            btnConfirm.disabled = !(chkAge.checked && chkRegion.checked);
        }
        chkAge.addEventListener('change', updateConfirmState);
        chkRegion.addEventListener('change', updateConfirmState);

        function enterSite() {
            gateOverlay.classList.add('hidden');
            mainCard.classList.add('reveal');
            casinoSection.classList.add('reveal');
            try { localStorage.setItem('casi_verified', '1'); } catch (e) {}
            setTimeout(function () { gateOverlay.style.display = 'none'; }, 400);
        }

        btnConfirm.addEventListener('click', function () {
            if (!btnConfirm.disabled) enterSite();
        });

        btnLeave.addEventListener('click', function () {
            window.location.href = 'https://www.google.com';
        });

        var alreadyVerified = false;
        try { alreadyVerified = localStorage.getItem('casi_verified') === '1'; } catch (e) {}
        if (alreadyVerified) {
            gateOverlay.style.display = 'none';
            mainCard.classList.add('reveal');
            casinoSection.classList.add('reveal');
        }
    });
</script>

</body>
</html>
