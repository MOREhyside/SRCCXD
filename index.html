<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF.8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>srccxd</title>
<meta name="description" content="casi (srccxd) official links — Discord, Twitch, Telegram, Instagram and contact info all in one place.">

<!-- Supabase JS Client for global unique Discord ID based counting -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Preloads for better LCP and performance -->
<link rel="preload" href="bg.jpg" as="image">
<link rel="preload" href="pfp.png" as="image">
<link rel="preload" href="Japan.jpg" as="image">
<link rel="preload" href="Dark Queen.jpg" as="image">
<link rel="preload" href="Feeling.jpg" as="image">

<!-- Social preview -->
<meta property="og:title" content="srccxd">
<meta property="og:description" content="Discord, Twitch, Telegram, Instagram and contact info all in one place.">
<meta property="og:image" content="pfp.png">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="srccxd">
<meta name="twitter:image" content="pfp.png">
<meta name="theme-color" content="#050814">
<link rel="icon" href="pfp.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
        --accent: #1ed760;
        --accent-hover: #1db954;
        --panel: rgba(18, 18, 18, 0.85);
        --panel-solid: #121212;
        --panel-border: rgba(255, 255, 255, 0.1);
        --text-main: #ffffff;
        --text-dim: #b3b3b3;
        --btn-disabled-bg: #454e63;
        --btn-disabled-text: #cfd4e2;
    }

    html, body { height: 100%; }

    body {
        font-family: 'Inter', sans-serif;
        color: var(--text-main);
        min-height: 100vh;
        overflow-x: hidden;
        position: relative;
        background: #050814;
    }

    /* ================= TOP RIGHT DISCORD PROFILE & STATS WIDGET ================= */
    .top-right-wrapper {
        position: fixed;
        top: 20px;
        right: 20px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 10px;
        z-index: 110;
    }

    .top-right-profile {
        display: flex;
        align-items: center;
        gap: 12px;
        background: rgba(18, 18, 18, 0.92);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        padding: 8px 16px 8px 10px;
        border-radius: 30px;
        border: 1px solid var(--accent);
        box-shadow: 0 4px 20px color-mix(in srgb, var(--accent) 30%, transparent);
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .top-right-profile:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 25px color-mix(in srgb, var(--accent) 50%, transparent);
    }
    .top-right-profile img {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid var(--accent);
    }
    .top-right-profile span {
        font-weight: 600;
        font-size: 14px;
        color: #ffffff;
        letter-spacing: 0.3px;
    }
    .logout-btn {
        background: transparent;
        border: none;
        color: var(--text-dim);
        font-size: 12px;
        cursor: pointer;
        margin-left: 8px;
        padding: 4px 8px;
        border-radius: 4px;
        transition: all 0.2s;
    }
    .logout-btn:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #ff5555;
    }

    /* Discord Stats Dropdown Card */
    .discord-stats-card {
        background: rgba(18, 18, 18, 0.95);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        padding: 16px;
        width: 260px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        font-size: 0.85rem;
        display: flex;
        flex-direction: column;
        gap: 12px;
        transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .discord-stats-card.hidden {
        display: none !important;
    }

    .stats-header {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        color: var(--accent);
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(255,255,255,0.08);
        padding-bottom: 8px;
    }

    .stats-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text-dim);
    }

    .stats-row span:last-child {
        color: #fff;
        font-weight: 600;
    }

    .hidden {
        display: none !important;
    }

    /* ================= INITIAL LOADER ANIMATION (PRELOADER) ================= */
    .intro-loader {
        position: fixed;
        inset: 0;
        background: #050814;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 200;
        transition: opacity 0.5s ease, visibility 0.5s ease;
    }

    .intro-loader.fade-out {
        opacity: 0;
        visibility: hidden;
    }

    .loader-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.08);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.7s linear infinite;
        box-shadow: 0 0 25px color-mix(in srgb, var(--accent) 30%, transparent);
    }

    @keyframes spin {
        to { transform: rotate(360deg); }
    }

    /* ================= BACKGROUND ================= */
    .bg {
        position: fixed;
        inset: 0;
        z-index: -2;
        overflow: hidden;
        background: #050814 url('bg.jpg') no-repeat center center;
        background-size: cover;
    }

    .bg-video {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 1;
    }

    .bg::after {
        content: "";
        position: absolute;
        inset: 0;
        background: rgba(4, 6, 14, 0.45);
        z-index: 2;
    }

    @media (max-width: 768px), (prefers-reduced-motion: reduce) {
        *, *::before, *::after { transition: none !important; animation: none !important; }
        .bg-video { display: none; }
    }

    /* ================= MAIN CONTENT ================= */
    main {
        position: relative;
        z-index: 5;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 8vh 20px 14vh;
        gap: 40px;
    }

    /* ================= CARD (PROFILE) ================= */
    .browser-window {
        width: 100%;
        max-width: 420px;
        background: var(--panel);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        box-shadow: 0 25px 60px rgba(0, 0, 0, 0.45);
        overflow: hidden;
        opacity: 0;
        transform: translateY(18px);
        transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .no-js .browser-window { opacity: 1; transform: none; }
    .browser-window.reveal { opacity: 1; transform: translateY(0); }

    .browser-header {
        background: rgba(255, 255, 255, 0.04);
        padding: 10px 15px;
        display: flex;
        align-items: center;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    .dots { display: flex; gap: 6px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-red { background-color: #ff5f56; }
    .dot-yellow { background-color: #ffbd2e; }
    .dot-green { background-color: #27c93f; }

    .content { padding: 34px 30px 28px; text-align: center; }

    /* ================= STAGGERED ANIMATION ELEMENTS ================= */
    .profile-container, .wordmark, .links-list li, .casino-section > * {
        opacity: 0;
        transform: translateY(15px);
        transition: opacity 0.4s ease, transform 0.4s ease;
    }

    .no-js .profile-container, 
    .no-js .wordmark, 
    .no-js .links-list li, 
    .no-js .casino-section > * {
        opacity: 1;
        transform: none;
    }

    .browser-window.reveal .profile-container {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.1s;
    }
    .browser-window.reveal .wordmark {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.2s;
    }
    .browser-window.reveal .links-list li:nth-child(1) {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.3s;
    }
    .browser-window.reveal .links-list li:nth-child(2) {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.38s;
    }
    .browser-window.reveal .links-list li:nth-child(3) {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.46s;
    }
    .browser-window.reveal .links-list li:nth-child(4) {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.54s;
    }
    .browser-window.reveal .links-list li:nth-child(5) {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.62s;
    }
    .casino-section.reveal .section-header-title {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.7s;
    }
    .casino-section.reveal .casino-grid {
        opacity: 1; transform: translateY(0);
        transition-delay: 0.78s;
    }

    .profile-container {
        position: relative;
        width: 108px;
        height: 108px;
        margin: 0 auto 16px;
    }

    .profile-img {
        width: 100%;
        height: 100%;
        border-radius: 50%;
        object-fit: cover;
        display: block;
        border: 3px solid var(--accent);
        box-shadow: 0 0 0 6px color-mix(in srgb, var(--accent) 25%, transparent), 0 8px 20px rgba(0,0,0,0.35);
    }

    .wordmark {
        font-family: 'Space Grotesk', sans-serif;
        font-weight: 700;
        font-size: 1.6rem;
        letter-spacing: 0.06em;
        color: var(--text-main);
        margin-bottom: 26px;
    }

    .links-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
        list-style: none;
    }

    .link-btn {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        position: relative;
        text-decoration: none;
        padding: 16px 20px 16px 72px;
        border-radius: 10px;
        font-size: 0.95rem;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        color: #ffffff;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        transition: transform 0.2s ease, box-shadow 0.25s ease, background 0.25s ease;
        cursor: pointer;
        width: 100%;
        text-align: left;
    }

    .link-btn:hover { transform: translateY(-3px); }

    .link-btn:focus-visible,
    .casino-btn:focus-visible,
    .gate-btn:focus-visible,
    .sp-control-btn:focus-visible,
    .sp-play-btn-large:focus-visible,
    .sp-slider:focus-visible,
    .gate-check input:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 3px;
    }

    .link-icon {
        position: absolute;
        left: 16px;
        width: 40px;
        height: 40px;
        object-fit: contain;
    }

    .btn-discord:hover   { background: #5865F2; box-shadow: 0 8px 22px rgba(88, 101, 242, 0.45); }
    .btn-twitch:hover    { background: #9146FF; box-shadow: 0 8px 22px rgba(145, 70, 255, 0.45); }
    .btn-telegram:hover  { background: #26A5E4; box-shadow: 0 8px 22px rgba(38, 165, 228, 0.45); }
    .btn-instagram:hover { background: #E1306C; box-shadow: 0 8px 22px rgba(225, 48, 108, 0.45); }
    .btn-email:hover     { background: #EA4335; box-shadow: 0 8px 22px rgba(234, 67, 53, 0.45); }

    /* Live badge on Twitch button */
    .live-badge {
        position: absolute;
        right: 16px;
        top: 50%;
        transform: translateY(-50%);
        display: none;
        align-items: center;
        gap: 5px;
        background: #eb0400;
        color: #fff;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 4px 8px 4px 6px;
        border-radius: 20px;
        text-transform: uppercase;
    }
    .live-badge.show { display: inline-flex; }
    .live-badge .live-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
        animation: livePulse 1.4s ease-in-out infinite;
    }
    @keyframes livePulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.35; }
    }

    /* Discord live presence pill (public, no login required) */
    .presence-pill {
        display: none;
        align-items: center;
        gap: 8px;
        justify-content: center;
        margin-top: 14px;
        font-size: 0.8rem;
        color: var(--text-dim);
    }
    .presence-pill.show { display: flex; }
    .presence-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #3ba55d;
        box-shadow: 0 0 8px #3ba55d;
        flex-shrink: 0;
    }
    .presence-pill strong { color: var(--text-main); }

    /* Now-playing (Last.fm) pill */
    .nowplaying-pill {
        display: none;
        align-items: center;
        gap: 10px;
        margin-top: 10px;
        padding: 8px 14px;
        border-radius: 20px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.08);
        font-size: 0.78rem;
        color: var(--text-dim);
        max-width: 100%;
    }
    .nowplaying-pill.show { display: inline-flex; }
    .nowplaying-pill img {
        width: 22px;
        height: 22px;
        border-radius: 5px;
        object-fit: cover;
        flex-shrink: 0;
    }
    .nowplaying-pill .np-text {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 220px;
    }
    .nowplaying-pill .np-text strong { color: var(--text-main); }
    .nowplaying-eq {
        display: flex;
        align-items: flex-end;
        gap: 2px;
        height: 12px;
        flex-shrink: 0;
    }
    .nowplaying-eq span {
        width: 3px;
        background: var(--accent);
        border-radius: 1px;
        animation: eqBounce 0.9s ease-in-out infinite;
    }
    .nowplaying-eq span:nth-child(1) { animation-delay: 0s; }
    .nowplaying-eq span:nth-child(2) { animation-delay: 0.2s; }
    .nowplaying-eq span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes eqBounce {
        0%, 100% { height: 3px; }
        50% { height: 12px; }
    }

    /* ================= CASINO SECTION ================= */
    .casino-section {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 20px;
    }

    .section-header-title {
        font-family: 'Space Grotesk', sans-serif;
        font-size: 1.4rem;
        color: #fff;
        display: flex;
        align-items: center;
        gap: 10px;
        padding-left: 5px;
    }

    .ad-tag {
        font-family: 'Inter', sans-serif;
        font-size: 0.65rem;
        font-weight: 600;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        color: var(--text-dim);
        border: 1px solid var(--panel-border);
        border-radius: 5px;
        padding: 2px 7px;
        margin-left: auto;
    }

    .casino-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 20px;
        width: 100%;
    }

    .casino-card {
        background: var(--panel);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        transition: transform 0.25s ease, box-shadow 0.25s ease, border-color 0.25s ease;
    }

    .casino-card:hover {
        transform: translateY(-5px);
        border-color: color-mix(in srgb, var(--accent) 50%, transparent);
        box-shadow: 0 20px 45px color-mix(in srgb, var(--accent) 20%, transparent);
    }

    .casino-logo {
        width: 100%;
        height: 160px;
        object-fit: contain;
        display: block;
        margin: 0 auto;
    }

    .casino-perks {
        display: flex;
        flex-direction: column;
        gap: 6px;
        font-size: 0.82rem;
        color: var(--text-dim);
        list-style: none;
    }

    .casino-perk-item {
        display: flex;
        align-items: center;
        gap: 6px;
    }

    .casino-perk-item::before {
        content: "✓";
        color: var(--accent);
        font-weight: bold;
    }

    .casino-btn {
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        padding: 12px;
        border-radius: 8px;
        font-family: 'Inter', sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        color: #050814;
        background: var(--accent);
        transition: background 0.2s ease, box-shadow 0.2s ease;
    }

    .casino-btn:hover {
        background: var(--accent-hover);
        box-shadow: 0 6px 20px color-mix(in srgb, var(--accent) 40%, transparent);
    }

    @media (min-width: 700px) {
        .casino-section { max-width: 900px; }
        .casino-grid { grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); }
    }

    /* ================= GUESTBOOK SECTION ================= */
    .guestbook-section {
        width: 100%;
        max-width: 420px;
        display: flex;
        flex-direction: column;
        gap: 16px;
    }

    .guestbook-card {
        background: var(--panel);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        border-radius: 16px;
        padding: 22px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    }

    .guestbook-form {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }

    .guestbook-form textarea {
        resize: none;
        min-height: 70px;
        border-radius: 10px;
        border: 1px solid var(--panel-border);
        background: rgba(255,255,255,0.04);
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        font-size: 0.88rem;
        padding: 12px 14px;
    }
    .guestbook-form textarea:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
    }

    .guestbook-form-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
    }

    .guestbook-char-count {
        font-size: 0.72rem;
        color: var(--text-dim);
    }

    .guestbook-submit {
        border: none;
        background: var(--accent);
        color: #050814;
        font-weight: 600;
        font-size: 0.85rem;
        padding: 9px 18px;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s ease;
        white-space: nowrap;
    }
    .guestbook-submit:hover { background: var(--accent-hover); }
    .guestbook-submit:disabled { opacity: 0.5; cursor: not-allowed; }

    .guestbook-login-hint {
        font-size: 0.82rem;
        color: var(--text-dim);
        text-align: center;
        padding: 10px;
    }

    .guestbook-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 320px;
        overflow-y: auto;
    }

    .guestbook-entry {
        display: flex;
        gap: 10px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255,255,255,0.03);
        text-align: left;
    }

    .guestbook-entry img {
        width: 30px;
        height: 30px;
        border-radius: 50%;
        object-fit: cover;
        flex-shrink: 0;
    }

    .guestbook-entry-body { min-width: 0; flex: 1; }

    .guestbook-entry-name {
        font-size: 0.82rem;
        font-weight: 600;
        color: var(--text-main);
    }

    .guestbook-entry-msg {
        font-size: 0.82rem;
        color: var(--text-dim);
        word-wrap: break-word;
        margin-top: 2px;
    }

    .guestbook-empty {
        font-size: 0.82rem;
        color: var(--text-dim);
        text-align: center;
        font-style: italic;
        padding: 8px;
    }

    /* ================= SPOTIFY VERTICAL PLAYER ================= */
    .spotify-player {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 90;
        background: rgba(18, 18, 18, 0.92);
        backdrop-filter: blur(18px);
        -webkit-backdrop-filter: blur(18px);
        border: 1px solid var(--panel-border);
        border-radius: 18px;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        color: var(--text-main);
        font-family: 'Inter', sans-serif;
        box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        width: 330px;
        transition: border-color 0.2s ease;
    }

    .spotify-player:hover {
        border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    }

    .sp-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--text-dim);
        letter-spacing: 0.05em;
        text-transform: uppercase;
    }

    .sp-cover {
        width: 100%;
        aspect-ratio: 1 / 1;
        border-radius: 10px;
        object-fit: cover;
        box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        transition: opacity 0.2s ease;
    }

    .sp-track-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
    }

    .sp-meta {
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-grow: 1;
        min-width: 0;
    }

    .sp-title {
        font-size: 1rem;
        font-weight: 700;
        color: var(--text-main);
        white-space: nowrap;
